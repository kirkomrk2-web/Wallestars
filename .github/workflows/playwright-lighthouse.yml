name: Playwright + Lighthouse + Accessibility

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  playwright:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Post Playwright results as PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '## 🎭 Playwright E2E Results\n\n';
            try {
              const results = JSON.parse(fs.readFileSync('playwright-report/results.json', 'utf8'));
              const { stats } = results;
              const icon = stats.unexpected === 0 ? '✅' : '❌';
              summary += `${icon} **${stats.expected} passed** | ${stats.unexpected} failed | ${stats.skipped} skipped\n`;
              summary += `\n_Browsers: Chromium, Firefox, Mobile Chrome_`;
              if (stats.unexpected > 0) {
                summary += '\n\n**Failed tests:**\n';
                results.suites.forEach(suite => {
                  suite.suites?.forEach(s => {
                    s.specs?.forEach(spec => {
                      if (spec.tests?.some(t => t.results?.some(r => r.status === 'unexpected'))) {
                        summary += `- ❌ ${spec.title}\n`;
                      }
                    });
                  });
                });
              }
            } catch (e) {
              summary += '_Results file not found — check workflow logs._';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });

  accessibility:
    name: Accessibility (axe-core)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run accessibility tests
        run: npm run test:accessibility
        env:
          CI: true

      - name: Upload accessibility report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-report
          path: playwright-report/
          retention-days: 14

  lighthouse:
    name: Performance (Lighthouse CI)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Build app
        run: npm run build
        env:
          CI: false

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post Lighthouse results as PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            let summary = '## 🔦 Lighthouse CI Results\n\n';
            const lhciDir = '.lighthouseci';
            try {
              const files = fs.readdirSync(lhciDir).filter(f => f.endsWith('.json') && !f.includes('manifest'));
              if (files.length > 0) {
                const report = JSON.parse(fs.readFileSync(path.join(lhciDir, files[0]), 'utf8'));
                const cats = report.categories;
                const score = (cat) => Math.round((cat?.score ?? 0) * 100);
                const icon = (s) => s >= 90 ? '🟢' : s >= 50 ? '🟡' : '🔴';
                summary += `| Category | Score |\n|---|---|\n`;
                summary += `| ${icon(score(cats.performance))} Performance | ${score(cats.performance)} |\n`;
                summary += `| ${icon(score(cats.accessibility))} Accessibility | ${score(cats.accessibility)} |\n`;
                summary += `| ${icon(score(cats['best-practices']))} Best Practices | ${score(cats['best-practices'])} |\n`;
                summary += `| ${icon(score(cats.seo))} SEO | ${score(cats.seo)} |\n`;
                const perfScore = score(cats.performance);
                if (perfScore < 85) {
                  summary += `\n⚠️ **Performance below threshold (${perfScore}/85)**`;
                }
              }
            } catch(e) {
              summary += '_Lighthouse report unavailable — check workflow logs._';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });
